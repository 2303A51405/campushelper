<!DOCTYPE html>
<html lang="en">
<head>
    <title>CampusHelper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎓 CampusHelper</h1>
        <p>Your College Life Made Easy</p>
    </header>

    <section class="tools">
        <div class="card">
            <h2>📊 CGPA Calculator</h2>

<input type="number" id="sub1" placeholder="Subject 1 Marks">
<input type="number" id="sub2" placeholder="Subject 2 Marks">
<input type="number" id="sub3" placeholder="Subject 3 Marks">
<input type="number" id="sub4" placeholder="Subject 4 Marks">
<input type="number" id="sub5" placeholder="Subject 5 Marks">

<br><br>
<button onclick="calculateCGPA()">Calculate CGPA</button>

<h3 id="result"></h3>
        </div>

        <div class="card">
            <h2>🗓 Timetable Maker</h2>
            <p>Create your weekly class timetable.</p>
        </div>

        <div class="card">
            <h2>⏰ Study Planner</h2>
            <p>Plan your daily study schedule.</p>
        </div>

        <div class="card">
            <h2>📚 Notes Section</h2>
            <p>Access useful study notes.</p>
        </div>
    </section>

</body>
</html>
